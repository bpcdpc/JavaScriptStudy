<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <h1>📋 Todo List</h1>
    <div>
      <input id="todoInput" type="text" placeholder="할 일" />
      <button id="addBtn">추가</button>
    </div>
    <ul id="todoList"></ul>
    <script>
      class TodoApp {
        todos = [];
        nextId = 1;

        // 추가
        addTodo(task) {
          const todo = {
            id: this.nextId++,
            task,
            done: false,
          };
          this.todos.push(todo);
          return todo.id;
        }

        // 상태
        toggleTodo(id) {
          const todo = this.todos.find((todo) => todo.id === id);
          if (todo) todo.done = !todo.done;
        }

        // 삭제
        removeTodo(id) {
          this.todos = this.todos.filter((todo) => todo.id !== id);
          const todo = document.querySelector(`li[data-id="${id}"]`);
          todo.remove();
        }

        // Todo 내용 만들기
        contentTodo(todo) {
          const li = document.createElement("li");
          li.textContent = ` [${todo.id}] ${todo.task}`;
          li.setAttribute("data-id", `${todo.id}`);
          todoList.appendChild(li);

          const checkSpan = document.createElement("span");
          checkSpan.textContent = `[${todo.done ? "✅" : " "}]`;
          checkSpan.setAttribute("data-id", `${todo.id}`);
          li.prepend(checkSpan);

          const doneBtn = document.createElement("button");
          doneBtn.setAttribute("class", "doneBtn");
          doneBtn.setAttribute("data-id", `${todo.id}`);
          doneBtn.textContent = "완료";
          li.appendChild(doneBtn);

          const delBtn = document.createElement("button");
          delBtn.setAttribute("class", "delBtn");
          delBtn.setAttribute("data-id", `${todo.id}`);
          delBtn.textContent = "삭제";
          li.appendChild(delBtn);
        }

        // 출력
        listTodos() {
          const items = todoList.querySelectorAll("li");
          [...items].forEach((item) => item.remove());
          this.todos.map((todo) => {
            this.contentTodo(todo);
          });
        }

        // 특정 항목 출력
        listTodo(id) {
          const todo = this.todos.find((todo) => todo.id === id);
          if (todo) {
            this.contentTodo(todo);
          }
        }

        // 특정 항목 삭제
        unlistTodo(id) {
          const item = document.querySelector(`li[data-id="${id}"]`);
          if (item) {
            item.remove();
          }
        }

        // 특정 항목 상태 업데이트
        updateTodo(id) {
          const todo = this.todos.find((todo) => todo.id === id);
          const item = document.querySelector(`li[data-id="${id}"]`);
          if (item && todo) {
            const check = item.querySelector("span");
            check.textContent = `[${todo.done ? "✅" : " "}]`;
          }
        }
      }

      const myTodo = new TodoApp();

      const todoList = document.querySelector("#todoList");
      const addBtn = document.querySelector("#addBtn");

      addBtn.addEventListener("click", () => {
        const todoInput = document.querySelector("#todoInput");
        if (typeof todoInput.value !== "string" || !todoInput.value.trim()) {
          return;
        }
        const task = todoInput.value.trim();
        const insertedId = myTodo.addTodo(task);
        myTodo.listTodo(insertedId);
        todoInput.value = "";
      });

      todoList.addEventListener("click", (e) => {
        const delBbtn = e.target.closest(".delBtn");
        if (delBbtn) {
          const deletedId = parseInt(e.target.dataset.id);
          myTodo.removeTodo(deletedId);
        }
        const doneBtn = e.target.closest(".doneBtn");
        if (doneBtn) {
          const doneId = parseInt(e.target.dataset.id);
          myTodo.toggleTodo(doneId);
          myTodo.updateTodo(doneId);
        }
      });
    </script>
  </body>
</html>
