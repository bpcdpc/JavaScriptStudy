<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <h1>📋 Todo List</h1>
    <div>
      <input id="todoInput" type="text" placeholder="할 일" />
      <button id="addBtn">추가</button>
    </div>
    <ul id="todoList"></ul>
    <script>
      class TodoApp {
        todos = [];
        nextId = 1;

        // 추가
        addTodo(task) {
          const todo = {
            id: this.nextId++,
            task,
            done: false,
          };
          this.todos.push(todo);
          return todo.id;
        }

        // 콘솔에 출력
        // consoleTodos() {
        //   console.log("📋 Todos List");
        //   this.todos.map((todo) => {
        //     console.log(`[${todo.done ? "✅" : " "}] ${todo.id}: ${todo.task}`);
        //   });
        // }

        // Todo 문자열 만들기
        contentTodo(todo) {
          const li = document.createElement("li");
          li.textContent = `[${todo.done ? "✅" : " "}] ${todo.id}: ${todo.task}`;
          li.setAttribute("data-id", `${todo.id}`);
          todoList.appendChild(li);

          const doneBtn = document.createElement("button");
          doneBtn.setAttribute("class", "doneBtn");
          doneBtn.textContent = "완료";
          li.appendChild(doneBtn);

          const delBtn = document.createElement("button");
          delBtn.setAttribute("class", "delBtn");
          delBtn.textContent = "삭제";
          li.appendChild(delBtn);

          const delBtns = document.querySelectorAll(".delBtn");
          const doneBtns = document.querySelectorAll(".doneBtn");

          delBtns.forEach((btn) => {
            btn.addEventListener("click", () => {
              const todoId = btn.parentElement.getAttribute("data-id");
              console.log(todoId);
            });
          });
        }

        // DOM에 출력
        listTodos() {
          this.todos.map((todo) => {
            this.contentTodo(todo);
          });
        }

        // DOM에 1개 출력
        listTodo(id) {
          const todo = this.todos.find((todo) => todo.id === id);
          if (todo) {
            this.contentTodo(todo);
          }
        }

        // 상태
        toggleTodo(id) {
          const todo = this.todos.find((todo) => todo.id === id);
          if (todo) todo.done = !todo.done;
        }

        // 삭제
        removeTodo(id) {
          this.todos = this.todos.filter((todo) => todo.id !== id);
        }
      }

      const myTodo = new TodoApp();

      const todoList = document.querySelector("#todoList");
      const addBtn = document.querySelector("#addBtn");

      addBtn.addEventListener("click", () => {
        const todoInput = document.querySelector("#todoInput");
        if (typeof todoInput.value !== "string" || !todoInput.value.trim()) {
          return;
        }
        const task = todoInput.value.trim();
        const insertedId = myTodo.addTodo(task);
        todoInput.value = "";
        myTodo.listTodo(insertedId);
      });
    </script>
  </body>
</html>
