<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <h1>📋 Todo List</h1>
    <div>
      <input id="todo-input" type="text" placeholder="할 일" />
      <button id="add-button">추가</button>
    </div>
    <ul id="todo-list"></ul>
    <script>
      class TodoApp {
        todos = [];
        nextId = 1;

        // 데이터 가져오기
        getTodo(id) {
          const todo = this.todos.find((todo) => todo.id === id);
          if (todo) return todo;
        }

        // 데이터 추가
        addTodo(task) {
          const todo = {
            id: this.nextId++,
            task,
            done: false,
          };
          this.todos.push(todo);
          return todo.id;
        }

        // 데이터 상태
        toggleTodo(id) {
          const todo = this.getTodo(id);
          if (todo) todo.done = !todo.done;
        }

        // 데이터 삭제
        removeTodo(id) {
          this.todos = this.todos.filter((todo) => todo.id !== id);
        }

        // DOM 가져오기
        getItem(id) {
          const item = document.querySelector(`li[data-id="${id}"]`);
          if (item) return item;
        }

        // DOM node 내용 만들기
        contentTodo(todo) {
          const li = document.createElement("li");
          li.textContent = ` [${todo.id}] ${todo.task}`;
          li.setAttribute("data-id", `${todo.id}`);
          todoList.appendChild(li);

          const checkSpan = document.createElement("span");
          checkSpan.textContent = `[${todo.done ? "✅" : " "}]`;
          checkSpan.setAttribute("data-id", `${todo.id}`);
          li.prepend(checkSpan);

          const doneBtn = document.createElement("button");
          doneBtn.setAttribute("class", "doneBtn");
          doneBtn.setAttribute("data-id", `${todo.id}`);
          doneBtn.textContent = "완료";
          li.appendChild(doneBtn);

          const delBtn = document.createElement("button");
          delBtn.setAttribute("class", "delBtn");
          delBtn.setAttribute("data-id", `${todo.id}`);
          delBtn.textContent = "삭제";
          li.appendChild(delBtn);
        }

        // DOM 출력
        listItems() {
          this.todos.map((todo) => {
            this.contentTodo(todo);
          });
        }

        // 특정 DOM 출력
        listItem(id) {
          const todo = this.getTodo(id);
          if (todo) this.contentTodo(todo);
        }

        // 특정 DOM 삭제
        unlistItem(id) {
          const item = this.getItem(id);
          if (item) item.remove();
        }

        // 특정 DOM 업데이트
        updateItem(id) {
          const todo = this.getTodo(id);
          const item = this.getItem(id);
          if (item && todo) {
            const check = item.querySelector("span");
            check.textContent = `[${todo.done ? "✅" : " "}]`;
          }
        }
      }

      const myTodo = new TodoApp();

      const todoList = document.querySelector("#todo-list");
      const todoInput = document.querySelector("#todo-input");
      const addBtn = document.querySelector("#add-button");

      addBtn.addEventListener("click", () => {
        if (typeof todoInput.value !== "string" || !todoInput.value.trim()) {
          return;
        }
        const job = todoInput.value.trim();
        const insertedId = myTodo.addTodo(job);
        myTodo.listItem(insertedId);
        todoInput.value = "";
      });

      todoList.addEventListener("click", (e) => {
        let delBtn = e.target.closest(".delBtn");
        let doneBtn = e.target.closest(".doneBtn");

        if (delBtn) {
          const deletedId = parseInt(delBtn.dataset.id);
          myTodo.unlistItem(deletedId);
          myTodo.removeTodo(deletedId);
          return;
        }
        if (doneBtn) {
          const doneId = parseInt(doneBtn.dataset.id);
          myTodo.toggleTodo(doneId);
          myTodo.updateItem(doneId);
          return;
        }
      });
    </script>
  </body>
</html>
