<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <h1>ًں“‹ Todo List</h1>
    <div>
      <input id="todoInput" type="text" placeholder="ي•  ى‌¼" />
      <button id="addBtn">ى¶”ê°€</button>
    </div>
    <ul id="todoList"></ul>
    <script>
      class TodoApp {
        todos = [];
        nextId = 1;

        // ى¶”ê°€
        addTodo(task) {
          const todo = {
            id: this.nextId++,
            task,
            done: false,
          };
          this.todos.push(todo);
          return todo.id;
        }

        // ى½کى†”ى—گ ى¶œë ¥
        // consoleTodos() {
        //   console.log("ًں“‹ Todos List");
        //   this.todos.map((todo) => {
        //     console.log(`[${todo.done ? "âœ…" : " "}] ${todo.id}: ${todo.task}`);
        //   });
        // }

        // Todo ë¬¸ى‍گى—´ ë§Œë“¤ê¸°
        contentTodo(todo) {
          const li = document.createElement("li");
          li.textContent = `[${todo.done ? "âœ…" : " "}] ${todo.id}: ${todo.task}`;
          li.setAttribute("data-id", `${todo.id}`);
          todoList.appendChild(li);

          const doneBtn = document.createElement("button");
          doneBtn.setAttribute("class", "doneBtn");
          doneBtn.setAttribute("data-id", `${todo.id}`);
          doneBtn.textContent = "ى™„ë£Œ";
          li.appendChild(doneBtn);

          const delBtn = document.createElement("button");
          delBtn.setAttribute("class", "delBtn");
          delBtn.setAttribute("data-id", `${todo.id}`);
          delBtn.textContent = "ى‚­ى œ";
          li.appendChild(delBtn);

          // const delBtns = document.querySelectorAll(".delBtn");
          // const doneBtns = document.querySelectorAll(".doneBtn");

          // delBtns.forEach((btn) => {
          //   btn.addEventListener("click", (e) => {
          //     const todoId = e.target.getAttribute("data-id");
          //     console.log(todoId);
          //   });
          // });
        }

        // DOMى—گ ى¶œë ¥
        listTodos() {
          this.todos.map((todo) => {
            this.contentTodo(todo);
          });
        }

        // DOMى—گ 1ê°œ ى¶œë ¥
        listTodo(id) {
          const todo = this.todos.find((todo) => todo.id === id);
          if (todo) {
            this.contentTodo(todo);
          }
        }

        // ىƒپيƒœ
        toggleTodo(id) {
          const todo = this.todos.find((todo) => todo.id === id);
          if (todo) todo.done = !todo.done;
        }

        // ى‚­ى œ
        removeTodo(id) {
          this.todos = this.todos.filter((todo) => todo.id !== id);
        }
      }

      const myTodo = new TodoApp();

      const todoList = document.querySelector("#todoList");
      const addBtn = document.querySelector("#addBtn");

      addBtn.addEventListener("click", () => {
        const todoInput = document.querySelector("#todoInput");
        if (typeof todoInput.value !== "string" || !todoInput.value.trim()) {
          return;
        }
        const task = todoInput.value.trim();
        const insertedId = myTodo.addTodo(task);
        todoInput.value = "";

        myTodo.listTodo(insertedId);
      });

      todoList.addEventListener("click", (e) => {
        const btn = e.target.closest(".delBtn");
        if (!btn) return;
        const deletedId = parseInt(btn.dataset.id);
        myTodo.removeTodo(deletedId);
        // const deletedItem = todoList.querySelector();
        // const list = document.querySelectorAll("#todoList > li");

        item.remove();
      });
    </script>
  </body>
</html>
