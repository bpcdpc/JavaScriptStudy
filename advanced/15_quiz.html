<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>영화 순위</h1>
    <button id="btn">공개</button>
    <ul id="container"></ul>
    <script>
      async function fetchData(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`#1 Error: ${response.status}`);
        }
        return response.json();
      }

      function validateData(data) {
        if (!data) {
          throw new Error("No Data.");
        }
        if (!data.articleList || data.articleList.length === 0) {
          throw new Error("No Article.");
        }
      }

      function extractData(data) {
        return data.map((item, index) => ({
          rank: index + 1,
          title: item.title,
        }));
      }

      function printData(data) {
        const list = document.querySelector("#container");

        for (let item of data) {
          const li = document.createElement("li");
          li.textContent = `[${item.rank}] ${item.title}`;
          list.appendChild(li);
        }
      }

      const url =
        "http://raw.githubusercontent.com/wapj/jsbackend/main/movieinfo.json";

      async function movies() {
        try {
          const data = await fetchData(url);
          validateData(data);
          const result = extractData(data.articleList);
          const btn = document.querySelector("#btn");
          btn.addEventListener("click", () => {
            const items = document.querySelectorAll("#container > li");
            if (items.length === 0) printData(result);
          });
        } catch (error) {
          console.log(error.message);
        }
      }

      movies();
    </script>
  </body>
</html>
